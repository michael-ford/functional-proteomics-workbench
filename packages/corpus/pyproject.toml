[project]
name = "functional-proteomics-corpus"
version = "0.1.0"
description = "Deterministic corpus ingestion and retrieval for the functional proteomics workbench"
requires-python = ">=3.11"
dependencies = []

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pyright>=1.1.390",
    "ruff>=0.8",
]

[project.scripts]
fpw-build-corpus = "functional_proteomics_corpus.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/functional_proteomics_corpus"]
artifacts = ["src/functional_proteomics_corpus/data/*.json"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.pyright]
include = ["src", "tests"]
pythonVersion = "3.11"
typeCheckingMode = "standard"

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
