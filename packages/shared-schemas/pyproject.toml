[project]
name = "functional-proteomics-shared-schemas"
version = "0.1.0"
description = "Shared Pydantic data contracts for the functional proteomics workbench"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7,<3",
    "python-ulid>=3,<4",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
]

[project.scripts]
shared-schemas-export-json-schema = "shared_schemas.export_schema:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shared_schemas"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
