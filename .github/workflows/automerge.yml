# Enable GitHub-native auto-merge on every non-draft PR. The PR merges (squash) the instant
# all required status checks are green (ci + review (claude) [+ review (codex) once live]).
# Requires: repo setting "Allow auto-merge" ON + branch protection with required checks.
# See docs/RUNNER_SETUP.md.
name: automerge
on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
permissions:
  contents: write
  pull-requests: write
jobs:
  enable-automerge:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge --auto --squash \
            "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" || \
            echo "::warning::could not enable auto-merge (is 'Allow auto-merge' on + branch protection set?)"
