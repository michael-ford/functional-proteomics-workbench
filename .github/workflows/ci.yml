name: ci
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
permissions:
  contents: read
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: install node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"
      - name: lint
        run: make lint
      - name: typecheck
        run: make typecheck
      - name: test
        run: make test
